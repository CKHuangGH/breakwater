global
    log stdout format raw local0
    stats socket /var/run/haproxy/admin.sock mode 660 level admin

defaults
    mode http
    log global
    option httplog
    timeout connect 1s
    timeout client 15s
    timeout server 15s
    timeout queue 1s

frontend online_boutique_frontend
    bind *:8080
    default_backend online_boutique_clusters

backend online_boutique_clusters
    option httpchk GET /
    http-check expect status 200
    server c1 CLUSTER1_IP:30080 check inter 200ms fall 2 rise 2
    server c2 CLUSTER2_IP:30080 check inter 200ms fall 2 rise 2 backup
